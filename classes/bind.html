<!DOCTYPE html>
<html lang="en">

<body>
    <button>Button Clicked</button>

    <!-- bind 
     a method,in JavaScript is used to fix the value of this for a function.
    It creates a new function where this is permanently set to a specific object.
    bind ki help se object ko dkh skte hai
    1.Event listeners
    2.Callbacks
    3.Jab function ko alag pass karte ho

    if we don't use bind
    this change ho jata hai
    bugs aate hain
    object ka data access nahi hota
    -->
    
</body>
<script>
    class React{
        constructor()
        {
            this.library="React"
            this.server="https://localhost:300"

            //requirement
            document.querySelector('button')
            .addEventListener('click',this.handleClick
            .bind(this))
          
            
            // {

            // }
        }
        handleClick(){
            console.log("button clicked");
           console.log(this);
            
            
        }
    }

    const app= new React()


</script>
