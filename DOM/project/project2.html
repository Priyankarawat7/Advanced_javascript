    <div class="bmi">
         <h1>BMI calculator</h1>
          <form>
    <label>Height in CM:</label>
    <input type="number" id="height"><br><br>
     <label>Weight in KG:</label>
      <input type="number" id="weight"><br><br>
      <button id="btn">calculate</button>
        
      <div id="result"></div>

       <div id="weight-guide">
        <h1>BMI weight-guide</h1>
        <p>Under Weight =less than 18.6</p>
        <p>Normal Weight =18.6 and 24.9</p>
        <p>OverWeight =Greater than 24.6</p>
       </div>



</form>
</div>
    
</body>
<script>

   // container=document.querySelectorAll('.bmi');
    // button=document.getElementById('btn');
    
   
    const form=document.querySelector('form');
    //this usecase will give you empty 
    //  height=parseInt(document.getElementById('height').value);
    //  weight=parseInt(document.getElementById('weight').value);
    
    form.addEventListener('submit',(e)=>{

        e.preventDefault();

    const height=parseInt(document.getElementById('height').value);
    const weight=parseInt(document.getElementById('weight').value);

   const  results=document.getElementById('result');

          
     if(height==='' || height<0 || isNaN(height)){
        results.innerHTML=`please enter a valid height ${height}`

     }
     else if(weight==='' || weight<0 || isNaN(weight)){
        results.innerHTML=`please enter a valid height ${weight}`

     }
     else{
     const bmi=   (weight/((height*height)/10000)).toFixed(2)

     //show the result
     results.innerHTML=` your BMi is ${bmi}`
     }

      })
  
</script>
