    <div class="contact-section">
        <form>
            <h1>Form</h1>
            <label for="name">username</label>
            <input type="text" id="name" placeholder="enter username">
             <label for="email">Email</label>
             <input type="email" id="email" placeholder="enter email">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="enter Password">
              <button class="btn">Submit</button>
               <div id="result"></div>
        </form>
    </div>

   
    
</body>
<script>

    form=document.querySelector('form');
    console.log(form);

    form.addEventListener('submit',(e)=>{
          e.preventDefault();

          const username= document.getElementById('name').value;
          const email=document.getElementById('email').value;
          const password=document.getElementById('password').value;

          const results=document.getElementById('result');

          if(username===''|| email==='' || password===''){

            results.innerHTML='please enter the fields';
             return;

          }
          if(username.length<3){
            results.innerHTML='username must be at least 3 letters';
             return;

          }
        const emailPattern = /^[^\s@]+@[^\s@]+\.[a-z]{2,3}$/;
         if(!emailPattern.test(email)){

            results.innerHTML='enter a valid email address';
             return;

          }
          if(password.length<6){

            results.innerHTML='password must be at least 6 characters';
            return;
          }
         {
            results.innerHTML='form submit sucessfully'
          }
      


    })
    

</script>
