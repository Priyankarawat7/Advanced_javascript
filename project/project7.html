<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project 2</title>
    <link rel="stylesheet" href="async.css">
</head>
<body>
    <!-- keyboard check    -->
       <nav>
    <a href="/">Home</a>
    <a target="_blank" href="https://www.youtube.com/">Youtube Channel</a>
    </nav>

    <div class="project">
        <div id="insert">
            <div class="key">
                Press the key and watch magic
            </div>
        </div>
    </div>
    
</body>
<script>

  const insert=document.getElementById('insert');

  window.addEventListener('keydown',(e)=>{
    insert.innerHTML=`
    <div class='color'>

        <table>
  <tr>
    <th>Key</th>
    <th>keycode</th>
    <th>Code</th>
  </tr>
  <tr>
    <td>${e.key===""? "Space" :e.key}</td>
    <td>${e.keyCode}</td>
    <td>${e.code}</td>
  </tr>
 
</table>

        
        </div>
    
    `

  })


</script>
</html>
